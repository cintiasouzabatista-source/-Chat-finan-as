<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bank Day</title>
    <style>
        :root{--bg:#e5ddd5;--card:#fff;--text:#1e1e1e;--border:#ddd;--primary:#25d366;--msg-user:#d9fdd3;--msg-system:#fff;--header:#075e54;--header-text:#fff;--danger:#ef4444}
        body.dark{--bg:#0b141a;--card:#1f2c33;--text:#e9edef;--border:#2a3942;--primary:#00a884;--msg-user:#005c4b;--msg-system:#1f2c33;--header:#1f2c33;--header-text:#e9edef}
        
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
        html,body{height:100%; overflow: hidden;}
        
        .app{
            max-width:480px;
            margin:0 auto;
            height: 100dvh;
            display:flex;
            flex-direction:column;
            background:var(--bg);
        }

        .app-header{
            background:var(--header);
            color:var(--header-text);
            padding:12px 16px;
            flex-shrink:0;
            z-index: 10;
        }

        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .header-top h1{font-size:18px}
        .header-actions{display:flex;gap:10px}
        .icon-btn{cursor:pointer;font-size:20px;background:none;border:none;color:var(--header-text)}
        
        .mes-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;background:rgba(255,255,255,0.15);padding:6px 10px;border-radius:8px}
        .mes-nav button{background:none;border:none;font-size:18px;color:var(--header-text);cursor:pointer;padding:0 8px}
        .mes-nav h2{text-transform:capitalize;font-size:16px;color:var(--header-text)}
        
        .totais{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .totais div{text-align:center;font-size:12px;background:rgba(255,255,255,0.15);padding:12px 8px;border-radius:8px;color:var(--header-text)}
        .totais strong{display:block;font-size:18px;margin-top:4px}
        
        .positivo{color:#4ade80!important}
        .negativo{color:#f87171!important}

        .chat-area{
            flex:1;
            overflow-y:auto;
            padding:12px;
            display: flex;
            flex-direction: column;
        }

        .msg{display:flex;margin-bottom:8px;transition:opacity 0.3s ease; flex-shrink: 0;}
        .msg.user{justify-content:flex-end}
        .msg-bubble{max-width:75%;padding:8px 12px;border-radius:8px;box-shadow:0 1px 1px rgba(0,0,0,0.1);font-size:14px;word-wrap:break-word;color:var(--text);background:var(--msg-system)}
        .msg.user .msg-bubble{background:var(--msg-user)}
        .msg-time{font-size:10px;opacity:0.6;margin-top:2px;text-align:right}
        .msg-info{font-size:11px;opacity:0.7;margin-top:4px}

        .input-area{
            background:var(--card);
            padding:8px 12px;
            display:flex;
            gap:8px;
            align-items:center;
            border-top:1px solid var(--border);
            flex-shrink:0;
            /* Margem inferior para não ficar atrás da bottom-nav */
            margin-bottom: 56px; 
        }

        #inputMsg{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);font-size:14px; outline: none;}
        #btnEnviar{background:var(--primary);color:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            height: 56px;
            background:var(--header);
            display:flex;
            justify-content:space-around;
            align-items: center;
            z-index:100;
        }

        .nav-item{background:none;border:none;color:var(--header-text);opacity:0.6;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;cursor:pointer}
        .nav-item span:first-child{font-size:20px}
        .nav-item.active{opacity:1}

        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:999;padding:16px}
        .modal-content{background:var(--card);padding:20px;border-radius:12px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
        .modal-botoes{display:flex;gap:10px;margin-top:12px}
        .modal-botoes button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer}
        .modal-botoes button:last-child{background:var(--primary);color:white}
    </style>
</head>
<body>
    <div class="app">
        <div class="app-header">
            <div class="header-top">
                <h1>Bank Day</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="alternarTema()" id="btnTema">🌙</button>
                    <button class="icon-btn" onclick="alternarValores()" id="olho">👁️</button>
                </div>
            </div>
            <div class="mes-nav">
                <button onclick="mudarMes(-1)">&lt;</button>
                <h2 id="mesAtual"></h2>
                <button onclick="mudarMes(1)">&gt;</button>
            </div>
            <div class="totais">
                <div>Entradas <strong id="totalEntradas" class="positivo">R$ 0,00</strong></div>
                <div>Saídas <strong id="totalSaidas" class="negativo">R$ 0,00</strong></div>
                <div>Fatura <strong id="totalFatura" class="negativo">R$ 0,00</strong></div>
                <div>Saldo <strong id="saldoMes">R$ 0,00</strong></div>
            </div>
        </div>

        <div class="chat-area" id="chat-area"></div>

        <div class="input-area">
            <input type="text" id="inputMsg" placeholder="Recebi 1000 | Gastei 50..." onkeydown="if(event.key==='Enter') enviar()">
            <button id="btnEnviar" onclick="enviar()">➤</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active"><span>💬</span><span>Chat</span></button>
        <button class="nav-item"><span>📊</span><span>Extrato</span></button>
        <button class="nav-item"><span>📈</span><span>Gráficos</span></button>
        <button class="nav-item" onclick="abrirModal()"><span>⋮</span><span>Mais</span></button>
    </nav>

    <div id="modal-conta" class="modal">
        <div class="modal-content">
            <h3>Cadastre sua primeira conta</h3>
            <input type="text" id="conta-nome" placeholder="Ex: Nubank">
            <input type="number" step="0.01" id="conta-saldo" placeholder="Saldo inicial">
            <div class="modal-botoes">
                <button onclick="fecharModal()">Pular</button>
                <button onclick="salvarConta()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // ... (Mantive sua lógica de script original abaixo) ...
        let dados = JSON.parse(localStorage.getItem('bankday') || '[]');
        let contas = JSON.parse(localStorage.getItem('bankday_contas') || '[]');
        let cartoes = JSON.parse(localStorage.getItem('bankday_cartoes') || '[]');
        let mesAtual = new Date();
        let valoresOcultos = false;

        const formatar = v => valoresOcultos? 'R$ ••••' : `R$ ${v.toFixed(2).replace('.',',')}`;
        const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

        function salvar() {
            localStorage.setItem('bankday', JSON.stringify(dados));
            localStorage.setItem('bankday_contas', JSON.stringify(contas));
            localStorage.setItem('bankday_cartoes', JSON.stringify(cartoes));
        }

        function addMensagem(texto, tipo = 'system', info = '', autoLimpar = true) {
            const chat = document.getElementById("chat-area");
            const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement("div");
            div.className = `msg ${tipo}`;
            div.innerHTML = `<div class="msg-bubble">${texto}${info? `<div class="msg-info">${info}</div>` : ''}<div class="msg-time">${hora}</div></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            if (autoLimpar && tipo === 'system') {
                let timer = setTimeout(() => {
                    div.style.opacity = '0';
                    setTimeout(() => div.remove(), 300);
                }, 4000); // Aumentei um pouco o tempo para leitura
            }
        }

        function processarMsg(txt) {
            addMensagem(txt, 'user', '', false);
            const texto = txt.toLowerCase();

            const parcelado = texto.match(/(\d+[\.,]?\d*)\s*(?:em\s*)?(\d+)x/);
            if (parcelado) {
                const valor = parseFloat(parcelado[1].replace(',', '.'));
                const vezes = parseInt(parcelado[2]);
                let desc = txt.replace(/comprei|gastei|parcelei/gi,'').replace(/\d+[\.,]?\d*/g,'').replace(/\d+x/gi,'').replace(/no cartão|cartão|crédito/gi,'').replace(/\s+/g,' ').trim();
                criarParcelamento(valor, vezes, desc || 'Compra');
                return;
            }

            const num = texto.match(/(\d+[\.,]?\d*)/);
            if (!num) { addMensagem("Não entendi o valor", 'system'); return; }

            const valor = parseFloat(num[1].replace(',', '.'));
            const tipo = texto.includes('recebi')? 'entrada' : 'saida';
            let desc = txt.replace(/comprei|gastei|recebi|paguei/gi,'').replace(/\d+[\.,]?\d*/g,'').replace(/no cartão|cartão|crédito/gi,'').replace(/\s+/g,' ').trim();

            criarLancamento(valor, tipo, desc || 'Transação');
        }

        function criarLancamento(valor, tipo, desc) {
            dados.push({id: Date.now(), valor, tipo, metodo: 'saldo', banco: contas[0]?.nome || 'Carteira', descricao: desc, data: new Date().toISOString()});
            salvar();
            atualizar();
            addMensagem(`${tipo === 'entrada'? 'Entrada' : 'Saída'}: ${desc}`, 'system', `R$ ${valor.toFixed(2)}`);
        }

        function criarParcelamento(total, qtd, desc) {
            const valorParc = parseFloat((total / qtd).toFixed(2));
            for (let i = 0; i < qtd; i++) {
                const data = new Date(mesAtual.getFullYear(), mesAtual.getMonth() + i, 1);
                dados.push({id: Date.now()+i, valor: valorParc, tipo: 'saida', metodo: 'cartao', banco: contas[0]?.nome || 'Carteira', descricao: `${desc} - ${i+1}/${qtd}`, data: data.toISOString()});
            }
            salvar();
            atualizar();
            addMensagem(`Parcelado: ${desc}`, 'system', `${qtd}x de R$ ${valorParc.toFixed(2)}`);
        }

        function atualizar() {
            const mes = mesAtual.getMonth(), ano = mesAtual.getFullYear();
            const dadosMes = dados.filter(d => { const dt = new Date(d.data); return dt.getMonth() === mes && dt.getFullYear() === ano; });
            const ent = dadosMes.filter(d => d.tipo === 'entrada').reduce((s,d) => s+d.valor, 0);
            const sai = dadosMes.filter(d => d.tipo === 'saida' && d.metodo!== 'cartao').reduce((s,d) => s+d.valor, 0);
            const fat = dadosMes.filter(d => d.tipo === 'saida' && d.metodo === 'cartao').reduce((s,d) => s+d.valor, 0);

            document.getElementById('totalEntradas').textContent = formatar(ent);
            document.getElementById('totalSaidas').textContent = formatar(sai);
            document.getElementById('totalFatura').textContent = formatar(fat);
            document.getElementById('saldoMes').textContent = formatar(ent - sai);
            document.getElementById('mesAtual').textContent = cap(mesAtual.toLocaleDateString('pt-BR', {month:'long', year:'numeric'}));
        }

        function mudarMes(d) { mesAtual.setMonth(mesAtual.getMonth() + d); atualizar(); }
        function alternarTema() { document.body.classList.toggle('dark'); document.getElementById('btnTema').textContent = document.body.classList.contains('dark')? '☀️' : '🌙'; }
        function alternarValores() { valoresOcultos =!valoresOcultos; document.getElementById('olho').textContent = valoresOcultos? '🙈' : '👁️'; atualizar(); }
        function enviar() { const i = document.getElementById('inputMsg'); if (i.value.trim()) { processarMsg(i.value.trim()); i.value = ''; } }
        
        function salvarConta() {
            const nome = document.getElementById('conta-nome').value.trim();
            const saldo = parseFloat(document.getElementById('conta-saldo').value) || 0;
            if (!nome) return;
            contas.push({nome, saldo});
            salvar();
            fecharModal();
            addMensagem(`Conta ${nome} criada`, 'system', `Saldo: R$ ${saldo.toFixed(2)}`);
        }
        function abrirModal() { document.getElementById('modal-conta').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal-conta').style.display = 'none'; }

        // Inicialização
        window.onload = () => {
            if (!contas.length) abrirModal();
            else addMensagem('Use: Recebi | Gastei | Celular 500 3x', 'system', '', false);
            atualizar();
        }
    </script>
</body>
</html>
